name: OpenClaw Runner

on:
  workflow_dispatch:
    inputs:
      auth_choice:
        description: Model provider for non-interactive onboarding
        required: true
        default: openai-api-key
        type: choice
        options:
          - openai-api-key
          - anthropic-api-key
          - openrouter-api-key
          - gemini-api-key
          - custom-api-key
          - skip
      session_minutes:
        description: Keep the runner alive for this many minutes (5-330)
        required: true
        default: "180"
        type: string
      tailscale_mode:
        description: Remote access mode
        required: true
        default: serve
        type: choice
        options:
          - serve
          - off
      custom_base_url:
        description: Custom provider base URL (custom-api-key only)
        required: false
        default: ""
        type: string
      custom_model_id:
        description: Custom provider model id (custom-api-key only)
        required: false
        default: ""
        type: string
      custom_provider_id:
        description: Optional custom provider id
        required: false
        default: ""
        type: string
      custom_compatibility:
        description: Custom provider compatibility
        required: true
        default: openai
        type: choice
        options:
          - openai
          - anthropic

jobs:
  openclaw:
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    permissions:
      contents: read

    env:
      AUTH_CHOICE: ${{ inputs.auth_choice }}
      SESSION_MINUTES: ${{ inputs.session_minutes }}
      TAILSCALE_MODE: ${{ inputs.tailscale_mode }}
      CUSTOM_BASE_URL: ${{ inputs.custom_base_url }}
      CUSTOM_MODEL_ID: ${{ inputs.custom_model_id }}
      CUSTOM_PROVIDER_ID: ${{ inputs.custom_provider_id }}
      CUSTOM_COMPATIBILITY: ${{ inputs.custom_compatibility }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CUSTOM_API_KEY: ${{ secrets.CUSTOM_API_KEY }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY || secrets.TAILSCALE_AUTH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs and secrets
        shell: bash
        run: |
          set -euo pipefail

          if ! [[ "$SESSION_MINUTES" =~ ^[0-9]+$ ]]; then
            echo "::error::session_minutes must be an integer."
            exit 1
          fi

          if (( SESSION_MINUTES < 5 || SESSION_MINUTES > 330 )); then
            echo "::error::session_minutes must be between 5 and 330."
            exit 1
          fi

          if [[ "$TAILSCALE_MODE" == "serve" && -z "${TAILSCALE_AUTHKEY:-}" ]]; then
            echo "::error::tailscale_mode=serve requires secret TAILSCALE_AUTHKEY or TAILSCALE_AUTH_KEY."
            exit 1
          fi

          case "$AUTH_CHOICE" in
            openai-api-key)
              [[ -n "${OPENAI_API_KEY:-}" ]] || {
                echo "::error::Missing OPENAI_API_KEY secret."
                exit 1
              }
              ;;
            anthropic-api-key)
              [[ -n "${ANTHROPIC_API_KEY:-}" ]] || {
                echo "::error::Missing ANTHROPIC_API_KEY secret."
                exit 1
              }
              ;;
            openrouter-api-key)
              [[ -n "${OPENROUTER_API_KEY:-}" ]] || {
                echo "::error::Missing OPENROUTER_API_KEY secret."
                exit 1
              }
              ;;
            gemini-api-key)
              [[ -n "${GEMINI_API_KEY:-}" ]] || {
                echo "::error::Missing GEMINI_API_KEY secret."
                exit 1
              }
              ;;
            custom-api-key)
              [[ -n "${CUSTOM_BASE_URL:-}" ]] || {
                echo "::error::custom-api-key requires custom_base_url."
                exit 1
              }
              [[ -n "${CUSTOM_MODEL_ID:-}" ]] || {
                echo "::error::custom-api-key requires custom_model_id."
                exit 1
              }
              ;;
            skip)
              echo "Running without a model provider. Control UI will come up, but chat will not be usable until you configure a model."
              ;;
            *)
              echo "::error::Unsupported auth_choice: $AUTH_CHOICE"
              exit 1
              ;;
          esac

      - name: Connect runner to Tailscale
        if: ${{ inputs.tailscale_mode == 'serve' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY || secrets.TAILSCALE_AUTH_KEY }}
          version: latest

      - name: Install OpenClaw
        shell: bash
        run: |
          set -euo pipefail

          export OPENCLAW_RUN_HOME="$RUNNER_TEMP/openclaw-home"
          export OPENCLAW_NO_PROMPT=1

          mkdir -p "$OPENCLAW_RUN_HOME"
          echo "OPENCLAW_RUN_HOME=$OPENCLAW_RUN_HOME" >> "$GITHUB_ENV"

          curl -fsSL --proto '=https' --tlsv1.2 https://openclaw.ai/install.sh | bash -s -- --no-onboard

          OPENCLAW_BIN="$(npm prefix -g)/bin"
          echo "$OPENCLAW_BIN" >> "$GITHUB_PATH"
          echo "OPENCLAW_BIN=$OPENCLAW_BIN" >> "$GITHUB_ENV"

          "$OPENCLAW_BIN/openclaw" --version

      - name: Onboard OpenClaw
        shell: bash
        run: |
          set -euo pipefail

          export HOME="$OPENCLAW_RUN_HOME"
          export PATH="$OPENCLAW_BIN:$PATH"
          export OPENCLAW_GATEWAY_TOKEN="$(openssl rand -hex 32)"

          echo "::add-mask::$OPENCLAW_GATEWAY_TOKEN"
          echo "OPENCLAW_GATEWAY_TOKEN=$OPENCLAW_GATEWAY_TOKEN" >> "$GITHUB_ENV"

          workspace_dir="$GITHUB_WORKSPACE/.openclaw-workspace"
          mkdir -p "$workspace_dir"

          cmd=(
            openclaw onboard
            --non-interactive
            --mode local
            --workspace "$workspace_dir"
            --secret-input-mode ref
            --gateway-port 18789
            --gateway-bind loopback
            --gateway-auth token
            --gateway-token-ref-env OPENCLAW_GATEWAY_TOKEN
            --no-install-daemon
            --skip-channels
            --skip-skills
            --skip-health
            --accept-risk
          )

          if [[ "$TAILSCALE_MODE" == "serve" ]]; then
            cmd+=(--tailscale serve)
          fi

          case "$AUTH_CHOICE" in
            openai-api-key)
              cmd+=(--auth-choice openai-api-key)
              ;;
            anthropic-api-key)
              cmd+=(--auth-choice anthropic-api-key)
              ;;
            openrouter-api-key)
              cmd+=(--auth-choice openrouter-api-key)
              ;;
            gemini-api-key)
              cmd+=(--auth-choice gemini-api-key)
              ;;
            custom-api-key)
              cmd+=(
                --auth-choice custom-api-key
                --custom-base-url "$CUSTOM_BASE_URL"
                --custom-model-id "$CUSTOM_MODEL_ID"
                --custom-compatibility "$CUSTOM_COMPATIBILITY"
              )

              if [[ -n "${CUSTOM_PROVIDER_ID:-}" ]]; then
                cmd+=(--custom-provider-id "$CUSTOM_PROVIDER_ID")
              fi
              ;;
            skip)
              cmd+=(--auth-choice skip)
              ;;
          esac

          "${cmd[@]}"
          openclaw doctor --non-interactive || true

      - name: Run OpenClaw session
        shell: bash
        run: |
          set -euo pipefail

          export HOME="$OPENCLAW_RUN_HOME"
          export PATH="$OPENCLAW_BIN:$PATH"
          gateway_log="$RUNNER_TEMP/openclaw-gateway.log"
          tailscale_log="$RUNNER_TEMP/tailscale-status.json"

          cleanup() {
            if [[ -n "${APPROVER_PID:-}" ]]; then
              kill "$APPROVER_PID" 2>/dev/null || true
            fi
            if [[ -n "${GATEWAY_PID:-}" ]]; then
              kill "$GATEWAY_PID" 2>/dev/null || true
              wait "$GATEWAY_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          stdbuf -oL -eL openclaw gateway >"$gateway_log" 2>&1 &
          GATEWAY_PID=$!

          for _ in $(seq 1 30); do
            if openclaw gateway status >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! openclaw gateway status >/dev/null 2>&1; then
            echo "::error::Gateway failed to become ready."
            tail -n 200 "$gateway_log" || true
            exit 1
          fi

          (
            while true; do
              openclaw devices approve --latest >/dev/null 2>&1 || true
              sleep 10
            done
          ) &
          APPROVER_PID=$!

          echo ""
          echo "===== OPENCLAW RUNNER ====="
          echo "Auth choice : $AUTH_CHOICE"
          echo "Session     : ${SESSION_MINUTES} minutes"
          echo "Workspace   : $GITHUB_WORKSPACE/.openclaw-workspace"
          echo "Gateway log : $gateway_log"

          if [[ "$TAILSCALE_MODE" == "serve" ]]; then
            tailscale status --json >"$tailscale_log"
            if command -v jq >/dev/null 2>&1; then
              ts_dns="$(jq -r '.Self.DNSName // empty' "$tailscale_log" | sed 's/\.$//')"
            else
              ts_dns="$(grep -oE '\"DNSName\":\"[^\"]+\"' "$tailscale_log" | head -n 1 | cut -d '"' -f 4 | sed 's/\.$//')"
            fi
            if [[ -n "$ts_dns" ]]; then
              echo "Control UI  : https://$ts_dns/"
              echo "Pairing     : auto-approve loop is active"
            else
              echo "Control UI  : tailscale connected, but DNS name could not be resolved from status output"
            fi
          else
            echo "Control UI  : local-only (set tailscale_mode=serve for remote access)"
          fi

          echo "==========================="
          echo ""

          remaining="$SESSION_MINUTES"
          while (( remaining > 0 )); do
            sleep_chunk=5
            if (( remaining < sleep_chunk )); then
              sleep_chunk="$remaining"
            fi

            sleep "$(( sleep_chunk * 60 ))"
            remaining="$(( remaining - sleep_chunk ))"
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] OpenClaw session alive. Minutes remaining: $remaining"
          done

      - name: Upload logs and config
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-run-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/openclaw-gateway.log
            ${{ runner.temp }}/tailscale-status.json
            ${{ env.OPENCLAW_RUN_HOME }}/.openclaw
            ${{ github.workspace }}/.openclaw-workspace
