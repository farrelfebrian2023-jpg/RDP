name: OpenClaw Runner

on:
  workflow_dispatch:
    inputs:
      auth_choice:
        description: Model provider for onboarding (`skip` or `openai-codex` avoids API-key requirement)
        required: true
        default: skip
        type: choice
        options:
          - openai-codex
          - openai-api-key
          - anthropic-api-key
          - openrouter-api-key
          - gemini-api-key
          - custom-api-key
          - skip
      session_minutes:
        description: Keep the runner alive for this many minutes (5-330)
        required: true
        default: "180"
        type: string
      tailscale_mode:
        description: Remote access mode (`serve` = HTTPS recommended, `tailnet-ip` = HTTP break-glass, both require TAILSCALE_AUTHKEY)
        required: true
        default: off
        type: choice
        options:
          - serve
          - tailnet-ip
          - off
      custom_base_url:
        description: Custom provider base URL (custom-api-key only)
        required: false
        default: ""
        type: string
      custom_model_id:
        description: Custom provider model id (custom-api-key only)
        required: false
        default: ""
        type: string
      custom_provider_id:
        description: Optional custom provider id
        required: false
        default: ""
        type: string
      custom_compatibility:
        description: Custom provider compatibility
        required: true
        default: openai
        type: choice
        options:
          - openai
          - anthropic

jobs:
  openclaw:
    runs-on: ubuntu-24.04
    timeout-minutes: 355
    permissions:
      contents: read

    env:
      AUTH_CHOICE: ${{ inputs.auth_choice }}
      SESSION_MINUTES: ${{ inputs.session_minutes }}
      TAILSCALE_MODE: ${{ inputs.tailscale_mode }}
      CUSTOM_BASE_URL: ${{ inputs.custom_base_url }}
      CUSTOM_MODEL_ID: ${{ inputs.custom_model_id }}
      CUSTOM_PROVIDER_ID: ${{ inputs.custom_provider_id }}
      CUSTOM_COMPATIBILITY: ${{ inputs.custom_compatibility }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CUSTOM_API_KEY: ${{ secrets.CUSTOM_API_KEY }}
      OPENCLAW_OAUTH_JSON_B64: ${{ secrets.OPENCLAW_OAUTH_JSON_B64 }}
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY || secrets.TAILSCALE_AUTH_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Initialize runtime paths
        shell: bash
        run: |
          set -euo pipefail
          echo "OPENCLAW_RUN_HOME=$RUNNER_TEMP/openclaw-home" >> "$GITHUB_ENV"

      - name: Validate inputs and secrets
        shell: bash
        run: |
          set -euo pipefail

          if ! [[ "$SESSION_MINUTES" =~ ^[0-9]+$ ]]; then
            echo "::error::session_minutes must be an integer."
            exit 1
          fi

          if (( SESSION_MINUTES < 5 || SESSION_MINUTES > 330 )); then
            echo "::error::session_minutes must be between 5 and 330."
            exit 1
          fi

          if [[ "$TAILSCALE_MODE" != "off" && -z "${TAILSCALE_AUTHKEY:-}" ]]; then
            echo "::error::tailscale_mode=$TAILSCALE_MODE requires secret TAILSCALE_AUTHKEY or TAILSCALE_AUTH_KEY."
            exit 1
          fi

          case "$AUTH_CHOICE" in
            openai-codex)
              echo "OpenAI Codex OAuth selected. The workflow will start OpenClaw without an API key; complete OAuth after the gateway is reachable."
              ;;
            openai-api-key)
              [[ -n "${OPENAI_API_KEY:-}" ]] || {
                echo "::error::Missing OPENAI_API_KEY secret."
                exit 1
              }
              ;;
            anthropic-api-key)
              [[ -n "${ANTHROPIC_API_KEY:-}" ]] || {
                echo "::error::Missing ANTHROPIC_API_KEY secret."
                exit 1
              }
              ;;
            openrouter-api-key)
              [[ -n "${OPENROUTER_API_KEY:-}" ]] || {
                echo "::error::Missing OPENROUTER_API_KEY secret."
                exit 1
              }
              ;;
            gemini-api-key)
              [[ -n "${GEMINI_API_KEY:-}" ]] || {
                echo "::error::Missing GEMINI_API_KEY secret."
                exit 1
              }
              ;;
            custom-api-key)
              [[ -n "${CUSTOM_BASE_URL:-}" ]] || {
                echo "::error::custom-api-key requires custom_base_url."
                exit 1
              }
              [[ -n "${CUSTOM_MODEL_ID:-}" ]] || {
                echo "::error::custom-api-key requires custom_model_id."
                exit 1
              }
              ;;
            skip)
              echo "Running without a model provider. Control UI will come up, but chat will not be usable until you configure a model."
              ;;
            *)
              echo "::error::Unsupported auth_choice: $AUTH_CHOICE"
              exit 1
              ;;
          esac

      - name: Import optional OAuth credentials
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${OPENCLAW_OAUTH_JSON_B64:-}" ]]; then
            exit 0
          fi

          cred_dir="$OPENCLAW_RUN_HOME/.openclaw/credentials"
          mkdir -p "$cred_dir"
          printf '%s' "$OPENCLAW_OAUTH_JSON_B64" | base64 -d > "$cred_dir/oauth.json"
          chmod 600 "$cred_dir/oauth.json"
          echo "Imported OAuth credentials into OpenClaw state."

      - name: Connect runner to Tailscale
        if: ${{ inputs.tailscale_mode != 'off' }}
        uses: tailscale/github-action@v4
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY || secrets.TAILSCALE_AUTH_KEY }}
          version: latest

      - name: Detect Tailscale endpoints
        if: ${{ inputs.tailscale_mode != 'off' }}
        shell: bash
        run: |
          set -euo pipefail

          tailscale status --json > "$RUNNER_TEMP/tailscale-status.json"
          ts_ip="$(tailscale ip -4 | head -n 1 | tr -d '\r')"

          if [[ -z "$ts_ip" ]]; then
            echo "::error::Failed to obtain a Tailscale IPv4 address."
            exit 1
          fi

          if command -v jq >/dev/null 2>&1; then
            ts_dns="$(jq -r '.Self.DNSName // empty' "$RUNNER_TEMP/tailscale-status.json" | sed 's/\.$//')"
          else
            ts_dns="$(grep -oE '\"DNSName\":\"[^\"]+\"' "$RUNNER_TEMP/tailscale-status.json" | head -n 1 | cut -d '"' -f 4 | sed 's/\.$//')"
          fi

          echo "TAILSCALE_IP=$ts_ip" >> "$GITHUB_ENV"
          echo "TAILSCALE_DNS=$ts_dns" >> "$GITHUB_ENV"

          echo "Tailscale IPv4: $ts_ip"
          if [[ -n "$ts_dns" ]]; then
            echo "Tailscale DNS: $ts_dns"
          fi

      - name: Install OpenClaw
        shell: bash
        run: |
          set -euo pipefail

          export OPENCLAW_NO_PROMPT=1

          mkdir -p "$OPENCLAW_RUN_HOME"

          echo "Node before install: $(node --version)"
          echo "npm before install: $(npm --version)"

          curl -fsSL --proto '=https' --tlsv1.2 https://openclaw.ai/install.sh | bash -s -- --no-onboard

          candidate_bins=(
            "$HOME/.local/bin"
            "$HOME/.npm-global/bin"
            "$(npm prefix -g)/bin"
          )

          OPENCLAW_BIN=""
          for bin_dir in "${candidate_bins[@]}"; do
            if [[ -x "$bin_dir/openclaw" ]]; then
              OPENCLAW_BIN="$bin_dir"
              break
            fi
          done

          if [[ -z "$OPENCLAW_BIN" ]]; then
            echo "::error::openclaw binary not found after install."
            printf 'Checked paths:\n%s\n' "${candidate_bins[@]}"
            exit 1
          fi

          export PATH="$OPENCLAW_BIN:$PATH"
          echo "$OPENCLAW_BIN" >> "$GITHUB_PATH"
          echo "OPENCLAW_BIN=$OPENCLAW_BIN" >> "$GITHUB_ENV"

          echo "Node after install: $(node --version)"
          echo "npm after install: $(npm --version)"
          echo "OpenClaw bin: $OPENCLAW_BIN"
          command -v openclaw
          openclaw --version

      - name: Onboard OpenClaw
        shell: bash
        run: |
          set -euo pipefail

          export HOME="$OPENCLAW_RUN_HOME"
          export PATH="$OPENCLAW_BIN:$PATH"
          export OPENCLAW_GATEWAY_TOKEN="$(openssl rand -hex 32)"
          if [[ "$TAILSCALE_MODE" == "tailnet-ip" ]]; then
            export OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
          fi

          echo "::add-mask::$OPENCLAW_GATEWAY_TOKEN"
          echo "OPENCLAW_GATEWAY_TOKEN=$OPENCLAW_GATEWAY_TOKEN" >> "$GITHUB_ENV"

          workspace_dir="$GITHUB_WORKSPACE/.openclaw-workspace"
          mkdir -p "$workspace_dir"

          gateway_bind="loopback"
          tailscale_args=()

          case "$TAILSCALE_MODE" in
            serve)
              tailscale_args=(--tailscale serve)
              ;;
            tailnet-ip)
              gateway_bind="tailnet"
              ;;
          esac

          cmd=(
            openclaw onboard
            --non-interactive
            --mode local
            --workspace "$workspace_dir"
            --secret-input-mode ref
            --gateway-port 18789
            --gateway-bind "$gateway_bind"
            --gateway-auth token
            --gateway-token-ref-env OPENCLAW_GATEWAY_TOKEN
            --no-install-daemon
            --skip-channels
            --skip-skills
            --skip-health
            --accept-risk
          )

          cmd+=("${tailscale_args[@]}")

          case "$AUTH_CHOICE" in
            openai-codex)
              cmd+=(--auth-choice skip)
              ;;
            openai-api-key)
              cmd+=(--auth-choice openai-api-key)
              ;;
            anthropic-api-key)
              cmd+=(--auth-choice anthropic-api-key)
              ;;
            openrouter-api-key)
              cmd+=(--auth-choice openrouter-api-key)
              ;;
            gemini-api-key)
              cmd+=(--auth-choice gemini-api-key)
              ;;
            custom-api-key)
              cmd+=(
                --auth-choice custom-api-key
                --custom-base-url "$CUSTOM_BASE_URL"
                --custom-model-id "$CUSTOM_MODEL_ID"
                --custom-compatibility "$CUSTOM_COMPATIBILITY"
              )

              if [[ -n "${CUSTOM_PROVIDER_ID:-}" ]]; then
                cmd+=(--custom-provider-id "$CUSTOM_PROVIDER_ID")
              fi
              ;;
            skip)
              cmd+=(--auth-choice skip)
              ;;
          esac

          "${cmd[@]}"

          if [[ "$AUTH_CHOICE" == "openai-codex" ]]; then
            openclaw config set agents.defaults.model.primary "openai-codex/gpt-5.4"
          fi

          if [[ "$AUTH_CHOICE" == "skip" || "$AUTH_CHOICE" == "openai-codex" ]]; then
            openclaw config set agents.defaults.memorySearch.enabled false
          fi

          if [[ "$TAILSCALE_MODE" == "serve" && -n "${TAILSCALE_DNS:-}" ]]; then
            openclaw config set gateway.controlUi.allowedOrigins "[\"https://$TAILSCALE_DNS\"]" --strict-json
          fi

          if [[ "$TAILSCALE_MODE" == "tailnet-ip" ]]; then
            if [[ -z "${TAILSCALE_IP:-}" ]]; then
              echo "::error::TAILSCALE_IP is required for tailscale_mode=tailnet-ip."
              exit 1
            fi

            openclaw config set gateway.controlUi.allowedOrigins "[\"http://$TAILSCALE_IP:18789\"]" --strict-json
            openclaw config set gateway.controlUi.dangerouslyDisableDeviceAuth true
          fi

          openclaw config validate

      - name: Run OpenClaw session
        shell: bash
        run: |
          set -euo pipefail

          export HOME="$OPENCLAW_RUN_HOME"
          export PATH="$OPENCLAW_BIN:$PATH"
          if [[ "$TAILSCALE_MODE" == "tailnet-ip" ]]; then
            export OPENCLAW_ALLOW_INSECURE_PRIVATE_WS=1
          fi
          access_file="$RUNNER_TEMP/openclaw-access.txt"
          gateway_log="$RUNNER_TEMP/openclaw-gateway.log"
          tailscale_log="$RUNNER_TEMP/tailscale-status.json"

          cleanup() {
            if [[ -n "${APPROVER_PID:-}" ]]; then
              kill "$APPROVER_PID" 2>/dev/null || true
            fi
            if [[ -n "${GATEWAY_PID:-}" ]]; then
              kill "$GATEWAY_PID" 2>/dev/null || true
              wait "$GATEWAY_PID" 2>/dev/null || true
            fi
          }
          trap cleanup EXIT

          stdbuf -oL -eL openclaw gateway >"$gateway_log" 2>&1 &
          GATEWAY_PID=$!

          for _ in $(seq 1 30); do
            if openclaw gateway status >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done

          if ! openclaw gateway status >/dev/null 2>&1; then
            echo "::error::Gateway failed to become ready."
            tail -n 200 "$gateway_log" || true
            exit 1
          fi

          (
            while true; do
              openclaw devices approve --latest >/dev/null 2>&1 || true
              sleep 10
            done
          ) &
          APPROVER_PID=$!

          echo ""
          echo "===== OPENCLAW RUNNER ====="
          echo "Auth choice : $AUTH_CHOICE"
          echo "Session     : ${SESSION_MINUTES} minutes"
          echo "Workspace   : $GITHUB_WORKSPACE/.openclaw-workspace"
          echo "Gateway log : $gateway_log"
          if [[ -f "$OPENCLAW_RUN_HOME/.openclaw/credentials/oauth.json" ]]; then
            echo "OAuth creds : imported from OPENCLAW_OAUTH_JSON_B64"
          fi

          if [[ "$AUTH_CHOICE" == "openai-codex" ]]; then
            echo "Model auth  : deferred"
            echo "Next step   : import OPENCLAW_OAUTH_JSON_B64 or run 'openclaw models auth login --provider openai-codex' on the gateway host"
          elif [[ "$AUTH_CHOICE" == "skip" ]]; then
            echo "Model auth  : skipped"
            echo "Next step   : configure a provider later from OpenClaw"
          fi

          {
            echo "auth_choice=$AUTH_CHOICE"
            echo "session_minutes=$SESSION_MINUTES"
            echo "workspace=$GITHUB_WORKSPACE/.openclaw-workspace"
          } > "$access_file"

          if [[ "$TAILSCALE_MODE" == "serve" ]]; then
            tailscale status --json >"$tailscale_log"
            if command -v jq >/dev/null 2>&1; then
              ts_dns="$(jq -r '.Self.DNSName // empty' "$tailscale_log" | sed 's/\.$//')"
            else
              ts_dns="$(grep -oE '\"DNSName\":\"[^\"]+\"' "$tailscale_log" | head -n 1 | cut -d '"' -f 4 | sed 's/\.$//')"
            fi
            if [[ -n "$ts_dns" ]]; then
              echo "tailscale_mode=serve" >> "$access_file"
              echo "tailscale_ip=${TAILSCALE_IP:-}" >> "$access_file"
              echo "control_ui=https://$ts_dns/" >> "$access_file"
              echo "Control UI  : https://$ts_dns/"
              echo "Pairing     : auto-approve loop is active"
              if [[ "$AUTH_CHOICE" == "openai-codex" ]]; then
                echo "OAuth note  : Control UI access works, but Codex OAuth itself still needs imported oauth.json or a gateway-shell login flow"
              fi
            else
              echo "Control UI  : tailscale connected, but DNS name could not be resolved from status output"
            fi
          elif [[ "$TAILSCALE_MODE" == "tailnet-ip" ]]; then
            echo "tailscale_mode=tailnet-ip" >> "$access_file"
            echo "tailscale_ip=${TAILSCALE_IP:-}" >> "$access_file"
            echo "control_ui=http://${TAILSCALE_IP}:18789/" >> "$access_file"
            echo "dashboard_bootstrap_url=http://${TAILSCALE_IP}:18789/#token=${OPENCLAW_GATEWAY_TOKEN}" >> "$access_file"
            echo "gateway_token=${OPENCLAW_GATEWAY_TOKEN}" >> "$access_file"
            echo "note=tailnet-ip uses plain HTTP and sets gateway.controlUi.dangerouslyDisableDeviceAuth=true for this ephemeral run" >> "$access_file"
            echo "Control UI  : http://${TAILSCALE_IP}:18789/"
            echo "Auth        : use the bootstrap URL or token saved in artifact openclaw-access.txt"
            echo "Security    : break-glass mode; device auth disabled for this ephemeral run"
            if [[ "$AUTH_CHOICE" == "openai-codex" ]]; then
              echo "OAuth note  : UI is reachable over the tailnet IP, but Codex OAuth itself still needs imported oauth.json or a gateway-shell login flow"
            fi
          else
            echo "tailscale_mode=off" >> "$access_file"
            echo "Control UI  : local-only (set tailscale_mode=serve for remote access)"
            if [[ "$AUTH_CHOICE" == "openai-codex" ]]; then
              echo "OAuth note  : GitHub-hosted runners need remote access to inspect the UI; Codex OAuth itself still needs imported oauth.json or a gateway-shell login flow"
            fi
          fi

          echo "==========================="
          echo ""

          remaining="$SESSION_MINUTES"
          while (( remaining > 0 )); do
            sleep_chunk=5
            if (( remaining < sleep_chunk )); then
              sleep_chunk="$remaining"
            fi

            sleep "$(( sleep_chunk * 60 ))"
            remaining="$(( remaining - sleep_chunk ))"
            echo "[$(date -u +'%Y-%m-%dT%H:%M:%SZ')] OpenClaw session alive. Minutes remaining: $remaining"
          done

      - name: Upload logs and config
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-run-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            ${{ runner.temp }}/openclaw-access.txt
            ${{ runner.temp }}/openclaw-gateway.log
            ${{ runner.temp }}/tailscale-status.json
            ${{ runner.temp }}/openclaw-home/.openclaw
            ${{ github.workspace }}/.openclaw-workspace
